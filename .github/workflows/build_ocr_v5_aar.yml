name: Build OcrLibrary V5 AAR

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'AAR version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  REFERENCE_AAR_URL: https://raw.githubusercontent.com/Asamo096/ocr-app/main/android/app/libs/OcrLibrary-1.3.0-release.aar
  PADDLE_VERSION: 3.0.0

jobs:
  build-onnx-models:
    name: Build PP-OCRv5 ONNX Models
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install paddlepaddle==${{ env.PADDLE_VERSION }} -i https://www.paddlepaddle.org.cn/packages/stable/cpu/
          pip install "paddlex[base]"
          paddlex --install paddle2onnx
          pip install onnx onnxsim requests

      - name: Download PP-OCRv5 models
        run: |
          mkdir -p models/paddle models/onnx
          
          # 下载检测模型
          echo "=== Downloading PP-OCRv5_mobile_det ==="
          wget -q --show-progress \
            https://paddle-model-ecology.bj.bcebos.com/paddlex/official_inference_model/paddle3.0.0/PP-OCRv5_mobile_det_infer.tar \
            -O models/paddle/det.tar
          
          # 下载识别模型
          echo "=== Downloading PP-OCRv5_mobile_rec ==="
          wget -q --show-progress \
            https://paddle-model-ecology.bj.bcebos.com/paddlex/official_inference_model/paddle3.0.0/PP-OCRv5_mobile_rec_infer.tar \
            -O models/paddle/rec.tar
          
          # 解压
          cd models/paddle
          tar -xf det.tar && rm det.tar
          tar -xf rec.tar && rm rec.tar
          cd ../..

      - name: Convert to ONNX
        run: |
          # 检测模型转换
          echo "=== Converting detection model ==="
          paddlex --paddle2onnx \
            --paddle_model_dir models/paddle/PP-OCRv5_mobile_det_infer \
            --onnx_model_dir models/onnx
          
          mv models/onnx/inference.onnx models/onnx/PP-OCRv5_det_infer.onnx
          echo "✓ Detection model converted"
          
          # 识别模型转换
          echo "=== Converting recognition model ==="
          paddlex --paddle2onnx \
            --paddle_model_dir models/paddle/PP-OCRv5_mobile_rec_infer \
            --onnx_model_dir models/onnx
          
          mv models/onnx/inference.onnx models/onnx/PP-OCRv5_rec_infer.onnx
          echo "✓ Recognition model converted"

      - name: Download dictionary
        run: |
          # 下载 v5 字典（如果不存在则使用 v4）
          wget -q \
            https://raw.githubusercontent.com/PaddlePaddle/PaddleOCR/release/2.7/ppocr/utils/ppocr_keys_v5.txt \
            -O models/onnx/ppocr_keys_v5.txt \
          || wget -q \
            https://raw.githubusercontent.com/PaddlePaddle/PaddleOCR/release/2.7/ppocr/utils/ppocr_keys_v4.txt \
            -O models/onnx/ppocr_keys_v5.txt

      - name: Optimize ONNX models
        run: |
          pip install onnxruntime
          
          python << 'EOF'
          import onnx
          from onnxsim import simplify
          import os
          
          models_dir = "models/onnx"
          
          for model_file in os.listdir(models_dir):
              if not model_file.endswith('.onnx'):
                  continue
              
              model_path = os.path.join(models_dir, model_file)
              print(f"Optimizing {model_file}...")
              
              try:
                  model = onnx.load(model_path)
                  model_simp, check = simplify(model)
                  
                  if check:
                      onnx.save(model_simp, model_path)
                      size = os.path.getsize(model_path) / 1024
                      print(f"  ✓ Simplified: {size:.1f} KB")
                  else:
                      print(f"  ! Simplification check failed")
              except Exception as e:
                  print(f"  ✗ Error: {e}")
          EOF

      - name: List models
        run: |
          echo "=== Generated ONNX models ==="
          ls -lh models/onnx/

      - name: Upload ONNX models
        uses: actions/upload-artifact@v4
        with:
          name: ppocrv5-onnx-models
          path: models/onnx/*.onnx
          retention-days: 7

  assemble-aar:
    name: Assemble AAR from Reference
    needs: build-onnx-models
    runs-on: ubuntu-22.04
    
    steps:
      - name: Download ONNX models
        uses: actions/download-artifact@v4
        with:
          name: ppocrv5-onnx-models
          path: ./onnx-models/

      - name: Download and extract reference AAR
        run: |
          echo "=== Downloading reference AAR ==="
          mkdir -p reference
          cd reference
          
          wget -q -O reference.aar "${{ env.REFERENCE_AAR_URL }}"
          unzip -q -o reference.aar -d extracted/
          
          echo "Reference AAR structure:"
          find extracted/ -type f | sort

      - name: Replace models with V5
        run: |
          echo "=== Replacing models ==="
          
          mkdir -p new_aar/assets/models
          
          # 复制新模型
          cp onnx-models/PP-OCRv5_det_infer.onnx new_aar/assets/models/
          cp onnx-models/PP-OCRv5_rec_infer.onnx new_aar/assets/models/
          
          # 复制字典
          if [ -f "onnx-models/ppocr_keys_v5.txt" ]; then
            cp onnx-models/ppocr_keys_v5.txt new_aar/assets/models/
          fi
          
          # 复制参考 AAR 的其他文件
          cp -r reference/extracted/jni new_aar/
          cp reference/extracted/*.jar new_aar/ 2>/dev/null || true
          cp reference/extracted/AndroidManifest.xml new_aar/
          cp -r reference/extracted/res new_aar/ 2>/dev/null || true
          cp reference/extracted/R.txt new_aar/ 2>/dev/null || true
          cp reference/extracted/proguard.txt new_aar/ 2>/dev/null || true
          
          echo "=== New AAR structure ==="
          find new_aar/ -type f | sort

      - name: Repackage AAR
        run: |
          VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          AAR_NAME="OcrLibrary-v5-${VERSION}-release.aar"
          
          echo "=== Repackaging AAR: $AAR_NAME ==="
          
          cd new_aar
          zip -r "../$AAR_NAME" . -x "*.DS_Store"
          
          cd ..
          
          echo "=== AAR created ==="
          ls -lh $AAR_NAME
          
          # 验证内容
          echo "=== AAR contents ==="
          unzip -l $AAR_NAME | grep -E "(onnx|so|txt|jar|AndroidManifest)"

      - name: Create checksum
        run: |
          VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          AAR_NAME="OcrLibrary-v5-${VERSION}-release.aar"
          
          sha256sum $AAR_NAME > ${AAR_NAME}.sha256

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-library-v5-aar
          path: |
            OcrLibrary-v5-*.aar
            *.sha256
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            OcrLibrary-v5-*.aar
            *.sha256
          body: |
            ## OcrLibrary V5 ${{ github.event.inputs.version || '1.0.0' }}
            
            ### 更新内容
            - ✅ 升级至 PP-OCRv5 模型
            - ✅ 支持 100+ 语言识别
            
            ### 模型信息
            | 模型 | 版本 | 输入尺寸 |
            |------|------|----------|
            | 检测 | PP-OCRv5_mobile_det | 640×640 |
            | 识别 | PP-OCRv5_mobile_rec | 动态高度48 |
            
            ### 使用方法
            ```gradle
            implementation files('libs/OcrLibrary-v5-1.0.0-release.aar')
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-aar:
    name: Verify AAR Contents
    needs: assemble-aar
    runs-on: ubuntu-22.04
    
    steps:
      - name: Download AAR
        uses: actions/download-artifact@v4
        with:
          name: ocr-library-v5-aar
          path: ./verify/

      - name: Verify structure
        run: |
          cd verify
          AAR_FILE=$(ls OcrLibrary-v5-*.aar | head -1)
          
          echo "=== Extracting $AAR_FILE ==="
          unzip -q -o $AAR_FILE -d extracted/
          
          echo "=== Verifying required files ==="
          
          check() {
            if [ -f "$1" ]; then
              size=$(stat -c%s "$1" 2>/dev/null || stat -f%z "$1")
              echo "✓ $1 ($((size/1024))KB)"
            else
              echo "✗ MISSING: $1"
              exit 1
            fi
          }
          
          echo "[Native Libraries]"
          check "extracted/jni/arm64-v8a/libRapidOcr.so"
          check "extracted/jni/arm64-v8a/libonnxruntime.so"
          
          echo "[PP-OCRv5 Models]"
          check "extracted/assets/models/PP-OCRv5_det_infer.onnx"
          check "extracted/assets/models/PP-OCRv5_rec_infer.onnx"
          check "extracted/assets/models/ppocr_keys_v5.txt"
          
          echo "[Java Classes]"
          check "extracted/classes.jar"
          
          echo ""
          echo "=== All checks passed! ==="
