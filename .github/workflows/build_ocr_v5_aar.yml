name: Build OcrLibrary V5 AAR

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      version:
        description: 'AAR version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  REFERENCE_AAR_URL: https://raw.githubusercontent.com/Asamo096/ocr-app/main/android/app/libs/OcrLibrary-1.3.0-release.aar
  PADDLE_VERSION: 3.0.0

jobs:
  build-onnx-models:
    name: Build PP-OCRv5 ONNX Models
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install paddlepaddle==${{ env.PADDLE_VERSION }} -i https://www.paddlepaddle.org.cn/packages/stable/cpu/
          pip install "paddlex[base]"
          paddlex --install paddle2onnx
          pip install onnx onnxsim

      - name: Download PP-OCRv5 models
        run: |
          mkdir -p models/paddle models/onnx
          
          echo "=== Downloading PP-OCRv5_mobile_det ==="
          wget -q --show-progress \
            https://paddle-model-ecology.bj.bcebos.com/paddlex/official_inference_model/paddle3.0.0/PP-OCRv5_mobile_det_infer.tar \
            -O models/paddle/det.tar
          
          echo "=== Downloading PP-OCRv5_mobile_rec ==="
          wget -q --show-progress \
            https://paddle-model-ecology.bj.bcebos.com/paddlex/official_inference_model/paddle3.0.0/PP-OCRv5_mobile_rec_infer.tar \
            -O models/paddle/rec.tar
          
          cd models/paddle
          tar -xf det.tar && rm det.tar
          tar -xf rec.tar && rm rec.tar
          cd ../..

      - name: Convert to ONNX
        run: |
          echo "=== Converting detection model ==="
          paddlex --paddle2onnx \
            --paddle_model_dir models/paddle/PP-OCRv5_mobile_det_infer \
            --onnx_model_dir models/onnx
          mv models/onnx/inference.onnx models/onnx/PP-OCRv5_det_infer.onnx
          echo "✓ Detection model converted"
          
          echo "=== Converting recognition model ==="
          paddlex --paddle2onnx \
            --paddle_model_dir models/paddle/PP-OCRv5_mobile_rec_infer \
            --onnx_model_dir models/onnx
          mv models/onnx/inference.onnx models/onnx/PP-OCRv5_rec_infer.onnx
          echo "✓ Recognition model converted"

      - name: Download dictionary
        run: |
          mkdir -p models/onnx
          echo "=== Downloading dictionary ==="
          
          if curl -sL --max-time 30 \
            https://raw.githubusercontent.com/PaddlePaddle/PaddleOCR/release/2.7/ppocr/utils/ppocr_keys_v4.txt \
            -o models/onnx/ppocr_keys_v5.txt 2>/dev/null; then
            echo "✓ Downloaded from GitHub"
          elif curl -sL --max-time 30 \
            https://gitee.com/paddlepaddle/PaddleOCR/raw/release/2.7/ppocr/utils/ppocr_keys_v4.txt \
            -o models/onnx/ppocr_keys_v5.txt 2>/dev/null; then
            echo "✓ Downloaded from Gitee"
          else
            echo "⚠ Download failed, will use reference AAR dictionary"
            touch models/onnx/ppocr_keys_v5.txt
          fi

      - name: Optimize ONNX models
        run: |
          pip install onnxruntime
          python << 'EOF'
          import onnx
          from onnxsim import simplify
          import os
          
          models_dir = "models/onnx"
          for model_file in os.listdir(models_dir):
              if not model_file.endswith('.onnx'):
                  continue
              model_path = os.path.join(models_dir, model_file)
              print(f"Optimizing {model_file}...")
              try:
                  model = onnx.load(model_path)
                  model_simp, check = simplify(model)
                  if check:
                      onnx.save(model_simp, model_path)
                      size = os.path.getsize(model_path) / 1024
                      print(f"  ✓ Simplified: {size:.1f} KB")
              except Exception as e:
                  print(f"  ✗ Error: {e}")
          EOF

      - name: Upload ONNX models
        uses: actions/upload-artifact@v4
        with:
          name: ppocrv5-onnx-models
          path: |
            models/onnx/*.onnx
            models/onnx/*.txt
          retention-days: 7

  assemble-aar:
    name: Assemble AAR from Reference
    needs: build-onnx-models
    runs-on: ubuntu-22.04
    outputs:
      aar_name: ${{ steps.package.outputs.aar_name }}
      aar_path: ${{ steps.package.outputs.aar_path }}
    
    steps:
      - name: Download ONNX models
        uses: actions/download-artifact@v4
        with:
          name: ppocrv5-onnx-models
          path: ./onnx-models/

      - name: Download and extract reference AAR
        run: |
          mkdir -p reference
          cd reference
          wget -q -O reference.aar "${{ env.REFERENCE_AAR_URL }}"
          unzip -q -o reference.aar -d extracted/
          cd ..

      - name: Replace models with V5
        run: |
          mkdir -p new_aar/assets/models
          
          cp onnx-models/PP-OCRv5_det_infer.onnx new_aar/assets/models/
          cp onnx-models/PP-OCRv5_rec_infer.onnx new_aar/assets/models/
          
          if [ -s "onnx-models/ppocr_keys_v5.txt" ]; then
            cp onnx-models/ppocr_keys_v5.txt new_aar/assets/models/
            echo "✓ Using downloaded dictionary"
          else
            DICT_FILE=$(find reference/extracted/ -name "*.txt" -type f | head -1)
            if [ -n "$DICT_FILE" ]; then
              cp "$DICT_FILE" new_aar/assets/models/ppocr_keys_v5.txt
              echo "✓ Using dictionary from reference AAR"
            fi
          fi
          
          cp -r reference/extracted/jni new_aar/
          cp reference/extracted/*.jar new_aar/ 2>/dev/null || true
          cp reference/extracted/AndroidManifest.xml new_aar/
          cp -r reference/extracted/res new_aar/ 2>/dev/null || true
          cp reference/extracted/R.txt new_aar/ 2>/dev/null || true

      - name: Package AAR
        id: package
        run: |
          VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          AAR_NAME="OcrLibrary-v5-${VERSION}-release"
          
          cd new_aar
          zip -r "../${AAR_NAME}.aar" . -x "*.DS_Store"
          cd ..
          
          sha256sum ${AAR_NAME}.aar > ${AAR_NAME}.aar.sha256
          
          echo "aar_name=${AAR_NAME}" >> $GITHUB_OUTPUT
          echo "aar_path=${AAR_NAME}.aar" >> $GITHUB_OUTPUT
          
          ls -lh ${AAR_NAME}.aar

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-library-v5-aar
          path: |
            OcrLibrary-v5-*.aar
            *.sha256
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: assemble-aar
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # 需要写入权限创建 release
    
    steps:
      - name: Download AAR artifact
        uses: actions/download-artifact@v4
        with:
          name: ocr-library-v5-aar
          path: ./release/

      - name: Get current time
        id: time
        run: |
          echo "time=$(date '+%Y/%m/%d/%H:%M')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date '+%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          # 使用文件名作为 tag（如 OcrLibrary-v5-1.0.0-release）
          tag_name: ${{ needs.assemble-aar.outputs.aar_name }}
          
          # 发布时间作为详情
          name: "${{ needs.assemble-aar.outputs.aar_name }} - ${{ steps.time.outputs.time }}"
          
          body: |
            ## OcrLibrary V5 AAR
            
            **发布时间**: ${{ steps.time.outputs.time }}
            
            ### 包含内容
            - PP-OCRv5 文本检测模型 (ONNX)
            - PP-OCRv5 文本识别模型 (ONNX)
            - 字符字典文件
            - ONNX Runtime 原生库
            
            ### 使用方法
            ```gradle
            // 下载 AAR 后放入 libs/ 目录
            implementation files('libs/${{ needs.assemble-aar.outputs.aar_name }}.aar')
            ```
            
            ```java
            OcrEngine engine = new OcrEngine(context);
            List<OcrResult> results = engine.recognize(bitmap);
            ```
            
            ### 校验信息
            SHA256 校验文件随 AAR 一同发布
            
          files: |
            release/*.aar
            release/*.sha256
          
          # 如果是手动触发，标记为正式版；否则为预发布
          prerelease: ${{ github.event_name != 'workflow_dispatch' }}
          
          # 如果 tag 已存在，更新 release
          allow_updates: true
          
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  verify-release:
    name: Verify Release
    needs: create-release
    runs-on: ubuntu-22.04
    
    steps:
      - name: Check release
        run: |
          echo "Release created: ${{ needs.assemble-aar.outputs.aar_name }}"
          echo "Download URL: https://github.com/${{ github.repository }}/releases/tag/${{ needs.assemble-aar.outputs.aar_name }}"
