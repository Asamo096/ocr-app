name: Build Complete OcrLibrary V5 AAR

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      version:
        description: 'AAR version (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  PADDLE_VERSION: 3.0.0
  ONNXRUNTIME_VERSION: 1.16.3
  NDK_VERSION: 26.1.10909125
  AAR_VERSION: ${{ github.event.inputs.version || '1.0.0' }}
  JAVA_VERSION: 17

jobs:
  build-onnx-models:
    name: Build PP-OCRv5 ONNX Models
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install paddlepaddle==${{ env.PADDLE_VERSION }} -i https://www.paddlepaddle.org.cn/packages/stable/cpu/
          pip install "paddlex[base]"
          paddlex --install paddle2onnx
          pip install onnx onnxsim

      - name: Download PP-OCRv5 models
        run: |
          mkdir -p models/paddle models/onnx
          
          wget -q \
            https://paddle-model-ecology.bj.bcebos.com/paddlex/official_inference_model/paddle3.0.0/PP-OCRv5_mobile_det_infer.tar \
            -O models/paddle/det.tar
          wget -q \
            https://paddle-model-ecology.bj.bcebos.com/paddlex/official_inference_model/paddle3.0.0/PP-OCRv5_mobile_rec_infer.tar \
            -O models/paddle/rec.tar
          
          cd models/paddle
          tar -xf det.tar && rm det.tar
          tar -xf rec.tar && rm rec.tar
          cd ../..

      - name: Convert to ONNX
        run: |
          paddlex --paddle2onnx \
            --paddle_model_dir models/paddle/PP-OCRv5_mobile_det_infer \
            --onnx_model_dir models/onnx
          mv models/onnx/inference.onnx models/onnx/PP-OCRv5_det_infer.onnx
          
          paddlex --paddle2onnx \
            --paddle_model_dir models/paddle/PP-OCRv5_mobile_rec_infer \
            --onnx_model_dir models/onnx
          mv models/onnx/inference.onnx models/onnx/PP-OCRv5_rec_infer.onnx

      - name: Download dictionary
        run: |
          mkdir -p models/onnx
          
          if curl -sL --max-time 30 \
            https://raw.githubusercontent.com/PaddlePaddle/PaddleOCR/release/2.7/ppocr/utils/ppocr_keys_v4.txt \
            -o models/onnx/ppocr_keys_v4.txt 2>/dev/null; then
            echo "✓ Downloaded ppocr_keys_v4.txt"
          elif curl -sL --max-time 30 \
            https://gitee.com/paddlepaddle/PaddleOCR/raw/release/2.7/ppocr/utils/ppocr_keys_v4.txt \
            -o models/onnx/ppocr_keys_v4.txt 2>/dev/null; then
            echo "✓ Downloaded from Gitee"
          else
            echo "⚠ Failed to download"
            touch models/onnx/ppocr_keys_v4.txt
          fi

      - name: Optimize ONNX models
        run: |
          pip install onnxruntime
          python << 'EOF'
          import onnx
          from onnxsim import simplify
          import os
          
          for f in os.listdir("models/onnx"):
              if f.endswith('.onnx'):
                  path = os.path.join("models/onnx", f)
                  print(f"Optimizing {f}...")
                  try:
                      model = onnx.load(path)
                      simp, check = simplify(model)
                      if check:
                          onnx.save(simp, path)
                          print(f"  ✓ {os.path.getsize(path)/1024:.1f} KB")
                  except Exception as e:
                      print(f"  ! {e}")
          EOF

      - name: Upload OCR library
        uses: actions/upload-artifact@v4
        with:
          name: ocr-native-lib
          path: native-libs/  # 上传整个目录，保持结构
          retention-days: 7

  build-onnxruntime:
    name: Get ONNX Runtime (Prebuilt)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Download prebuilt ONNX Runtime
        run: |
          mkdir -p native-libs/arm64-v8a native-libs/include
          
          # 下载官方 Android AAR
          wget -q https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/${{ env.ONNXRUNTIME_VERSION }}/onnxruntime-android-${{ env.ONNXRUNTIME_VERSION }}.aar
          
          # 解压获取 so 文件
          unzip -q onnxruntime-android-${{ env.ONNXRUNTIME_VERSION }}.aar -d onnxruntime_aar
          cp onnxruntime_aar/jni/arm64-v8a/libonnxruntime.so native-libs/arm64-v8a/
          
          # 下载头文件（从源码包获取）
          wget -q https://github.com/microsoft/onnxruntime/archive/refs/tags/v${{ env.ONNXRUNTIME_VERSION }}.tar.gz
          tar -xzf v${{ env.ONNXRUNTIME_VERSION }}.tar.gz
          cp -r onnxruntime-${{ env.ONNXRUNTIME_VERSION }}/include/onnxruntime native-libs/include/
          
          echo "✓ ONNX Runtime obtained from prebuilt AAR"
          ls -lh native-libs/arm64-v8a/

      - name: Upload ONNX Runtime
        uses: actions/upload-artifact@v4
        with:
          name: onnxruntime-lib
          path: |
            native-libs/arm64-v8a/
            native-libs/include/
          retention-days: 7

  build-android-aar:
    name: Build Android AAR Package
    runs-on: ubuntu-22.04
    needs: [build-onnx-models, build-onnxruntime]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'
          packages: 'platforms;android-34 build-tools;34.0.0'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts/

      - name: Organize files for AAR
        run: |
          mkdir -p android-project/OcrLibrary/src/main/jniLibs/arm64-v8a
          mkdir -p android-project/OcrLibrary/src/main/assets/models
          mkdir -p android-project/OcrLibrary/src/main/java/com/ocr/library
          
          # 检查 artifacts 结构
          echo "=== Checking artifacts structure ==="
          find artifacts/ -type f | head -20
          
          # ONNX Runtime
          if [ -d "artifacts/onnxruntime-lib/arm64-v8a" ]; then
            cp artifacts/onnxruntime-lib/arm64-v8a/*.so android-project/OcrLibrary/src/main/jniLibs/arm64-v8a/
            echo "✓ Copied ONNX Runtime"
          else
            echo "⚠ ONNX Runtime not found, checking alternative paths..."
            find artifacts/ -name "libonnxruntime.so" -exec cp {} android-project/OcrLibrary/src/main/jniLibs/arm64-v8a/ \;
          fi
          
          # OCR Native Library - 检查多个可能的路径
          if [ -d "artifacts/ocr-native-lib/arm64-v8a" ]; then
            cp artifacts/ocr-native-lib/arm64-v8a/*.so android-project/OcrLibrary/src/main/jniLibs/arm64-v8a/
            echo "✓ Copied OCR native library from ocr-native-lib/arm64-v8a"
          elif [ -d "artifacts/ocr-native-lib" ]; then
            # 可能直接在上传目录下
            find artifacts/ocr-native-lib/ -name "*.so" -exec cp {} android-project/OcrLibrary/src/main/jniLibs/arm64-v8a/ \;
            echo "✓ Copied OCR native library from ocr-native-lib"
          else
            echo "⚠ OCR native library not found, checking..."
            find artifacts/ -name "libocr.so" -exec cp {} android-project/OcrLibrary/src/main/jniLibs/arm64-v8a/ \;
          fi
          
          # ONNX 模型
          if [ -d "artifacts/onnx-models" ]; then
            cp artifacts/onnx-models/*.onnx android-project/OcrLibrary/src/main/assets/models/ 2>/dev/null || true
            cp artifacts/onnx-models/*.txt android-project/OcrLibrary/src/main/assets/models/ 2>/dev/null || true
            echo "✓ Copied ONNX models"
          fi
          
          echo "=== Final AAR contents ==="
          find android-project/ -type f | sort

      - name: Generate Java source code
        run: |
          cd android-project/OcrLibrary/src/main/java/com/ocr/library
          
          cat > OcrEngine.java << 'EOF'
          package com.ocr.library;
          
          import android.content.Context;
          import android.graphics.Bitmap;
          import android.graphics.Point;
          import android.util.Log;
          import java.io.*;
          import java.util.List;
          import java.util.ArrayList;
          
          public class OcrEngine {
              private static final String TAG = "OcrEngine";
              
              static {
                  System.loadLibrary("ocr");
                  System.loadLibrary("onnxruntime");
              }
              
              private long nativeHandle = 0;
              private final Context context;
              
              public OcrEngine(Context context) {
                  this.context = context.getApplicationContext();
                  init();
              }
              
              private void init() {
                  try {
                      String detPath = copyAssetToCache("models/PP-OCRv5_det_infer.onnx");
                      String recPath = copyAssetToCache("models/PP-OCRv5_rec_infer.onnx");
                      String dictPath = copyAssetToCache("models/ppocr_keys_v4.txt");
                      
                      nativeHandle = nativeInit(detPath, recPath, dictPath);
                      if (nativeHandle == 0) {
                          throw new RuntimeException("Failed to initialize OCR engine");
                      }
                      Log.i(TAG, "OCR Engine initialized");
                  } catch (IOException e) {
                      throw new RuntimeException("Failed to initialize", e);
                  }
              }
              
              private String copyAssetToCache(String assetPath) throws IOException {
                  File outFile = new File(context.getCacheDir(), assetPath);
                  outFile.getParentFile().mkdirs();
                  if (outFile.exists()) return outFile.getAbsolutePath();
                  
                  try (InputStream is = context.getAssets().open(assetPath);
                       FileOutputStream fos = new FileOutputStream(outFile)) {
                      byte[] buffer = new byte[8192];
                      int read;
                      while ((read = is.read(buffer)) != -1) {
                          fos.write(buffer, 0, read);
                      }
                  }
                  return outFile.getAbsolutePath();
              }
              
              public List<OcrResult> recognize(Bitmap bitmap) {
                  if (nativeHandle == 0) {
                      throw new IllegalStateException("Engine not initialized");
                  }
                  return nativeRecognize(nativeHandle, bitmap);
              }
              
              public void release() {
                  if (nativeHandle != 0) {
                      nativeRelease(nativeHandle);
                      nativeHandle = 0;
                  }
              }
              
              @Override
              protected void finalize() throws Throwable {
                  try { release(); } finally { super.finalize(); }
              }
              
              private native long nativeInit(String detModelPath, String recModelPath, String dictPath);
              private native List<OcrResult> nativeRecognize(long handle, Bitmap bitmap);
              private native void nativeRelease(long handle);
          }
          EOF
          
          cat > OcrResult.java << 'EOF'
          package com.ocr.library;
          
          import android.graphics.Point;
          
          public class OcrResult {
              private final String text;
              private final Point[] points;
              private final float confidence;
              
              public OcrResult(String text, Point[] points, float confidence) {
                  this.text = text;
                  this.points = points;
                  this.confidence = confidence;
              }
              
              public String getText() { return text; }
              public Point[] getPoints() { return points; }
              public float getConfidence() { return confidence; }
              
              @Override
              public String toString() {
                  return String.format("OcrResult{text='%s', confidence=%.2f}", text, confidence);
              }
          }
          EOF

      - name: Create Gradle build files
        run: |
          cd android-project
          
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "OcrLibrary"
          include ':OcrLibrary'
          EOF
          
          cd OcrLibrary
          
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.library' version '8.2.0' apply false
          }
          
          android {
              namespace 'com.ocr.library'
              compileSdk 34
              
              defaultConfig {
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
                  ndk { abiFilters 'arm64-v8a' }
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              
              packagingOptions {
                  pickFirst 'lib/arm64-v8a/libc++_shared.so'
                  noCompress 'onnx'
              }
              
              libraryVariants.all { variant ->
                  variant.outputs.all {
                      outputFileName = "OcrLibrary-v5-${defaultConfig.versionName}-${variant.name}.aar"
                  }
              }
          }
          
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF
          
          mkdir -p src/main
          cat > src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          </manifest>
          EOF

      - name: Build AAR with Gradle
        run: |
          cd android-project
          
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
          unzip -q gradle-8.2-bin.zip
          export PATH=$PWD/gradle-8.2/bin:$PATH
          
          gradle wrapper --gradle-version 8.2
          ./gradlew :OcrLibrary:assembleRelease
          
          mkdir -p $GITHUB_WORKSPACE/output
          cp OcrLibrary/build/outputs/aar/*.aar $GITHUB_WORKSPACE/output/
          
          cd $GITHUB_WORKSPACE/output
          sha256sum *.aar > checksums.txt
          
          echo "=== Build complete ==="
          ls -lh *.aar

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: ocr-aar-final
          path: |
            output/*.aar
            output/checksums.txt
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: build-android-aar
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
      - name: Download AAR
        uses: actions/download-artifact@v4
        with:
          name: ocr-aar-final
          path: ./release/

      - name: Get current time
        id: time
        run: |
          echo "time=$(date '+%Y/%m/%d/%H:%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: OcrLibrary-v5-${{ env.AAR_VERSION }}
          name: "OcrLibrary-v5-${{ env.AAR_VERSION }} - ${{ steps.time.outputs.time }}"
          body: |
            ## OcrLibrary V5 AAR
            
            **发布时间**: ${{ steps.time.outputs.time }}
            **版本**: ${{ env.AAR_VERSION }}
            
            ### 构建信息
            - 架构: `arm64-v8a` (64位 ARM)
            - ONNX Runtime: ${{ env.ONNXRUNTIME_VERSION }} (从源码编译)
            - 模型: PP-OCRv5 Mobile
            - 字典: PP-OCRv4/v5 通用
            
            ### 包含内容
            | 组件 | 来源 | 说明 |
            |------|------|------|
            | `libocr.so` | 源码编译 | OCR 引擎 JNI 封装 |
            | `libonnxruntime.so` | 源码编译 | ONNX Runtime Android |
            | `PP-OCRv5_det_infer.onnx` | PaddleX 转换 | 文本检测模型 |
            | `PP-OCRv5_rec_infer.onnx` | PaddleX 转换 | 文本识别模型 |
            | `ppocr_keys_v4.txt` | 官方下载 | 字符字典 |
            
            ### 编译选项
            - C++ 标准: C++17
            - 优化级别: `-O3`
            - 链接优化: `-Wl,--gc-sections -Wl,-s`
            - 异常/RTTI: 禁用 (minimal build)
            
            ### 使用方法
            ```gradle
            implementation files('libs/OcrLibrary-v5-${{ env.AAR_VERSION }}-release.aar')
            ```
            
            ```java
            OcrEngine engine = new OcrEngine(context);
            List<OcrResult> results = engine.recognize(bitmap);
            for (OcrResult r : results) {
                Log.d("OCR", "Text: " + r.getText());
            }
            engine.release();
            ```
            
          files: |
            release/*.aar
            release/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
